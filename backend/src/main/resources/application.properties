spring.application.name=backend

# Lokale Credentials aus .env (siehe .env.example). Optional: fehlt die Datei, wird sie ignoriert.
spring.config.import=optional:file:./.env[.properties]

# --- Datasource (MariaDB) ---
# Passe URL/User/Passwort an deine lokale Installation an (oder via Umgebungsvariablen).
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/teller_statt_tonne?restrictedAuth=mysql_native_password,caching_sha2_password,ed25519}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# --- Liquibase ---
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# --- JWT ---
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-min-32-chars-long-please}
app.jwt.access-ttl=PT15M
app.jwt.refresh-ttl=P7D

# --- Initial Admin (wird beim Start angelegt, falls noch nicht vorhanden) ---
app.admin.email=${ADMIN_EMAIL:admin@local}
app.admin.password=${ADMIN_PASSWORD:admin1234}

# --- File Uploads (Profilfotos) ---
app.uploads.dir=${UPLOADS_DIR:./uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# --- Mail (SMTP) ---
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME:Teller statt Tonne}

# --- CORS ---
# Komma-separierte Liste erlaubter Origins (z.B. https://teller-statt-tonne.example.de,https://www.example.de)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# --- Quiz ---
quiz.max-attempts=3
