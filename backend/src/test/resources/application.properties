# Test-DB: H2 im MariaDB-Kompatibilitätsmodus, damit Liquibase-Changelogs 1:1 laufen.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# Tests sollen Nominatim nie wirklich aufrufen.
geocoding.nominatim.base-url=http://localhost:1
geocoding.nominatim.user-agent=teller-statt-tonne-test

# --- JWT (Tests) ---
app.jwt.secret=test-secret-change-me-min-32-chars-long-please
app.jwt.access-ttl=PT15M
app.jwt.refresh-ttl=P7D

# --- Mail (Tests) ---
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
app.mail.from=noreply@test.local
app.mail.from-name=Teller statt Tonne Test
