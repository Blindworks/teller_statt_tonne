<section class="pt-24 pb-32 md:pb-12 px-6 md:pl-80 md:pr-12 max-w-screen-2xl mx-auto min-h-screen">
  <header class="mb-8">
    <h1 class="text-3xl md:text-4xl font-extrabold text-on-surface">Administration</h1>
    <p class="text-sm text-on-surface-variant mt-2">
      Zentrale Verwaltungsbereiche, sichtbar nur für Administrator-Konten.
    </p>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
    @for (card of cards(); track card.link) {
      <a
        [routerLink]="card.link"
        class="block bg-surface-container-lowest p-6 rounded-2xl shadow-[0_20px_50px_rgba(48,52,40,0.04)] hover:shadow-xl transition-all duration-300 group"
      >
        <div class="flex items-start gap-4">
          <span
            class="material-symbols-outlined text-3xl text-primary bg-primary-container/40 rounded-2xl p-3"
          >
            {{ card.icon }}
          </span>
          <div class="flex-1">
            <h2 class="text-xl font-bold text-on-surface group-hover:text-primary transition-colors">
              {{ card.title }}
            </h2>
            <p class="text-sm text-on-surface-variant mt-1">{{ card.description }}</p>
          </div>
          <span
            class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform"
          >
            chevron_right
          </span>
        </div>
      </a>
    }
  </div>
</section>
