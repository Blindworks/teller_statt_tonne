<div class="fixed inset-0 bg-black/40 z-[2000] flex items-center justify-center px-4" (click)="onCancel()">
  <div class="bg-surface rounded-2xl shadow-2xl max-w-lg w-full p-6" (click)="$event.stopPropagation()">
    <h2 class="text-lg font-bold text-on-surface mb-1">
      {{ editing() ? 'Feature bearbeiten' : 'Neues Feature' }}
    </h2>
    <p class="text-xs text-on-surface-variant mb-4">
      Ein Feature wird erst in der GUI wirksam, wenn der Key im Frontend-Code geprüft wird.
    </p>

    <form (submit)="onSubmit($event)" class="space-y-4">
      <label class="block">
        <span class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Key</span>
        <input
          type="text"
          [ngModel]="key()"
          (ngModelChange)="key.set($event)"
          name="key"
          required
          pattern="^[a-z][a-z0-9.\-]{1,127}$"
          [disabled]="editing()"
          class="mt-1 w-full rounded-xl border border-outline-variant px-3 py-2 font-mono text-sm bg-surface-container-lowest disabled:opacity-60"
          placeholder="z. B. nav.events oder quiz.attempt.delete"
        />
        @if (editing()) {
          <span class="text-xs text-on-surface-variant">Key kann nach dem Anlegen nicht mehr geändert werden.</span>
        } @else {
          <span class="text-xs text-on-surface-variant">
            Erlaubt: Kleinbuchstaben, Ziffern, Punkt, Bindestrich. Muss mit Buchstabe beginnen.
          </span>
        }
      </label>

      <label class="block">
        <span class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Bezeichnung</span>
        <input
          type="text"
          [ngModel]="label()"
          (ngModelChange)="label.set($event)"
          name="label"
          required
          class="mt-1 w-full rounded-xl border border-outline-variant px-3 py-2 text-sm bg-surface-container-lowest"
          placeholder="Menschenlesbarer Name"
        />
      </label>

      <label class="block">
        <span class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Kategorie</span>
        <input
          type="text"
          [ngModel]="category()"
          (ngModelChange)="category.set($event)"
          name="category"
          class="mt-1 w-full rounded-xl border border-outline-variant px-3 py-2 text-sm bg-surface-container-lowest"
          placeholder="z. B. Navigation, Routen, Aktionen"
        />
      </label>

      <label class="block">
        <span class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Beschreibung</span>
        <textarea
          [ngModel]="description()"
          (ngModelChange)="description.set($event)"
          name="description"
          rows="3"
          class="mt-1 w-full rounded-xl border border-outline-variant px-3 py-2 text-sm bg-surface-container-lowest"
        ></textarea>
      </label>

      <label class="block">
        <span class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Sortierung</span>
        <input
          type="number"
          [ngModel]="sortOrder()"
          (ngModelChange)="sortOrder.set($event)"
          name="sortOrder"
          class="mt-1 w-32 rounded-xl border border-outline-variant px-3 py-2 text-sm bg-surface-container-lowest"
        />
      </label>

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="onCancel()"
          class="rounded-full px-4 py-2 text-sm font-semibold text-on-surface hover:bg-surface-container"
        >
          Abbrechen
        </button>
        <button
          type="submit"
          [disabled]="busy"
          class="rounded-full bg-primary text-on-primary px-5 py-2 text-sm font-bold disabled:opacity-50"
        >
          Speichern
        </button>
      </div>
    </form>
  </div>
</div>
