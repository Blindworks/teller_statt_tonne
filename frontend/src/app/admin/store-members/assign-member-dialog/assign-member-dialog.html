<div
  (click)="onBackdrop($event)"
  class="fixed inset-0 z-50 bg-on-surface/40 backdrop-blur-sm flex items-center justify-center p-4"
>
  <div
    class="bg-surface-container-lowest rounded-xl w-full max-w-lg max-h-[80vh] flex flex-col shadow-2xl overflow-hidden"
  >
    <header
      class="flex items-center justify-between px-6 py-5 border-b border-outline-variant/30"
    >
      <div>
        <h3 class="text-xl font-bold text-on-surface">Mitglied zuweisen</h3>
        <p class="text-xs text-on-surface-variant mt-0.5">an {{ partnerName }}</p>
      </div>
      <button
        type="button"
        (click)="close.emit()"
        class="p-2 rounded-full hover:bg-surface-container-high transition-colors"
        title="Schließen"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="px-6 py-4 border-b border-outline-variant/30">
      <div class="flex items-center px-4 py-2 bg-surface-container-high rounded-full">
        <span class="material-symbols-outlined text-on-surface-variant mr-2 text-sm"
          >search</span
        >
        <input
          type="text"
          placeholder="Mitglied suchen…"
          [ngModel]="search()"
          (ngModelChange)="search.set($event)"
          class="bg-transparent border-none focus:ring-0 text-sm flex-1 placeholder:text-on-surface-variant/50 outline-none"
        />
      </div>
    </div>

    <ul class="flex-1 overflow-y-auto py-2">
      @for (member of filtered(); track member.id) {
        <li>
          <button
            type="button"
            (click)="onPick(member)"
            class="w-full text-left px-6 py-3 flex items-center gap-3 hover:bg-surface-container transition-colors"
          >
            @if (member.photoUrl) {
              <img
                [src]="member.photoUrl | photoUrl"
                alt=""
                class="w-10 h-10 rounded-full object-cover"
              />
            } @else {
              <div
                class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center text-sm font-bold"
              >
                {{ initials(member) }}
              </div>
            }
            <div class="flex-1 min-w-0">
              <p class="font-bold text-on-surface text-sm truncate">
                {{ member.firstName }} {{ member.lastName }}
              </p>
              <p class="text-[11px] text-on-surface-variant uppercase tracking-wider">
                {{ member.role }}
              </p>
            </div>
            <span class="material-symbols-outlined text-primary text-xl">add</span>
          </button>
        </li>
      } @empty {
        <li class="px-6 py-8 text-center text-sm text-on-surface-variant">
          Keine zuweisbaren Mitglieder gefunden.
        </li>
      }
    </ul>
  </div>
</div>
