<div class="auth-container">
  <div class="auth-card">
    <h1>Anmelden</h1>
    <p class="subtitle">Teller statt Tonne</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        <span>E-Mail</span>
        <input type="email" formControlName="email" autocomplete="email" required />
      </label>

      <label>
        <span>Passwort</span>
        <input type="password" formControlName="password" autocomplete="current-password" required />
      </label>

      @if (error()) {
        <div class="error">{{ error() }}</div>
      }

      <button type="submit" [disabled]="form.invalid || submitting()">
        @if (submitting()) { Anmelden … } @else { Anmelden }
      </button>
    </form>

    <p class="auth-footer">
      Noch kein Konto? <a routerLink="/register">Registrieren</a>
    </p>
  </div>
</div>
