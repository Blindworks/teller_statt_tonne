<div class="auth-container">
  <div class="auth-card">
    <h1>Registrieren</h1>
    <p class="subtitle">Teller statt Tonne</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        <span>E-Mail</span>
        <input type="email" formControlName="email" autocomplete="email" required />
      </label>

      <label>
        <span>Passwort (min. 8 Zeichen)</span>
        <input type="password" formControlName="password" autocomplete="new-password" required minlength="8" />
      </label>

      @if (error()) {
        <div class="error">{{ error() }}</div>
      }

      <button type="submit" [disabled]="form.invalid || submitting()">
        @if (submitting()) { Konto wird angelegt … } @else { Konto anlegen }
      </button>
    </form>

    <p class="auth-footer">
      Schon registriert? <a routerLink="/login">Anmelden</a>
    </p>
  </div>
</div>
