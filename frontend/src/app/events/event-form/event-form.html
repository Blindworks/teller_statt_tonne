<section class="pt-24 pb-32 md:pb-12 px-6 md:pl-80 md:pr-12 max-w-3xl mx-auto min-h-screen">
  <a
    routerLink="/events"
    class="inline-flex items-center gap-1 text-sm text-on-surface-variant hover:text-primary mb-2"
  >
    <span class="material-symbols-outlined text-base">arrow_back</span>
    Veranstaltungen
  </a>
  <h1 class="text-3xl md:text-4xl font-extrabold text-on-surface mb-6">
    @if (isEdit()) { Veranstaltung bearbeiten } @else { Neue Veranstaltung }
  </h1>

  @if (errorMessage()) {
    <p class="mb-4 rounded-lg bg-error-container text-on-error-container px-4 py-3 text-sm">
      {{ errorMessage() }}
    </p>
  }

  <form
    [formGroup]="form"
    (ngSubmit)="save()"
    class="bg-surface-container-lowest rounded-2xl shadow-[0_20px_50px_rgba(48,52,40,0.04)] p-6 md:p-8 space-y-6"
  >
    <div>
      <label class="block text-sm font-bold text-on-surface mb-1">Name *</label>
      <input
        type="text"
        formControlName="name"
        class="w-full rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
      />
    </div>

    <div>
      <label class="block text-sm font-bold text-on-surface mb-1">Beschreibung</label>
      <textarea
        formControlName="description"
        rows="3"
        class="w-full rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
      ></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-bold text-on-surface mb-1">Beginn *</label>
        <input
          type="date"
          formControlName="startDate"
          class="w-full rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>
      <div>
        <label class="block text-sm font-bold text-on-surface mb-1">Ende *</label>
        <input
          type="date"
          formControlName="endDate"
          class="w-full rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>
    </div>

    <fieldset class="space-y-3">
      <legend class="text-sm font-bold text-on-surface">Adresse</legend>
      <input
        type="text"
        formControlName="street"
        placeholder="Straße und Hausnummer"
        class="w-full rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
      />
      <div class="grid grid-cols-3 gap-4">
        <input
          type="text"
          formControlName="postalCode"
          placeholder="PLZ"
          class="rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
        />
        <input
          type="text"
          formControlName="city"
          placeholder="Ort"
          class="col-span-2 rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>
    </fieldset>

    <fieldset class="space-y-3">
      <legend class="text-sm font-bold text-on-surface">Ansprechperson</legend>
      <input
        type="text"
        formControlName="contactName"
        placeholder="Name"
        class="w-full rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
      />
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input
          type="email"
          formControlName="contactEmail"
          placeholder="E-Mail"
          class="rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
        />
        <input
          type="tel"
          formControlName="contactPhone"
          placeholder="Telefon"
          class="rounded-lg border border-outline-variant bg-surface px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>
    </fieldset>

    @if (isEdit()) {
      <fieldset class="space-y-3">
        <legend class="text-sm font-bold text-on-surface">Logo</legend>
        <div class="flex items-center gap-4">
          @if (logoUrl()) {
            <img [src]="logoUrl()" alt="Logo" class="h-16 w-16 rounded-full object-cover" />
          } @else {
            <span class="material-symbols-outlined text-4xl text-on-surface-variant">event</span>
          }
          <input
            type="file"
            accept="image/*"
            #logoInput
            (change)="onLogoFile(logoInput)"
            [disabled]="uploadingLogo()"
            class="text-sm"
          />
        </div>
      </fieldset>
    }

    <div class="flex justify-end gap-3 pt-4 border-t border-outline-variant/30">
      <a
        routerLink="/events"
        class="rounded-full px-5 py-2 text-sm font-bold text-on-surface hover:bg-surface-container"
      >
        Abbrechen
      </a>
      <button
        type="submit"
        [disabled]="saving() || form.invalid"
        class="rounded-full bg-primary text-on-primary px-5 py-2 text-sm font-bold shadow disabled:opacity-50"
      >
        @if (isEdit()) { Speichern } @else { Anlegen }
      </button>
    </div>
  </form>
</section>
