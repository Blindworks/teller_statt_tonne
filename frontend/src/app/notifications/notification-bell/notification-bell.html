<div class="relative">
  <button
    type="button"
    (click)="toggle($event)"
    title="Benachrichtigungen"
    class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-green-50 transition-colors relative"
  >
    <span class="material-symbols-outlined">notifications</span>
    @if (badgeText(); as badge) {
      <span
        class="absolute -top-0.5 -right-0.5 min-w-[1.1rem] h-[1.1rem] px-1 flex items-center justify-center rounded-full bg-error text-white text-[0.65rem] font-bold leading-none"
      >
        {{ badge }}
      </span>
    }
  </button>

  @if (open()) {
    <div
      class="fixed top-16 left-2 right-2 w-auto md:left-auto md:w-80 md:max-w-[calc(100vw-1rem)] rounded-2xl bg-surface shadow-2xl ring-1 ring-outline-variant/20 overflow-hidden z-50"
      (click)="$event.stopPropagation()"
    >
      <div class="px-5 py-3 flex items-center justify-between border-b border-outline-variant/20">
        <p class="text-sm font-bold text-on-surface">Benachrichtigungen</p>
        @if (unreadCount() > 0) {
          <button
            type="button"
            (click)="markAllRead($event)"
            class="text-xs font-semibold text-primary hover:underline"
          >
            Alle gelesen
          </button>
        }
      </div>

      @if (visibleNotifications().length === 0) {
        <div class="px-5 py-6 text-sm text-on-surface-variant text-center">
          Keine Benachrichtigungen
        </div>
      } @else {
        <ul class="max-h-96 overflow-y-auto">
          @for (item of visibleNotifications(); track item.id) {
            <li>
              <button
                type="button"
                (click)="onItemClick(item)"
                class="w-full text-left px-5 py-3 hover:bg-surface-container-low transition-colors flex flex-col gap-1 border-b border-outline-variant/10 last:border-b-0"
                [class.bg-primary-container]="item.readAt === null"
                [class.bg-opacity-30]="item.readAt === null"
              >
                <div class="flex items-start justify-between gap-2">
                  <p
                    class="text-sm font-semibold text-on-surface flex-1"
                    [class.font-bold]="item.readAt === null"
                  >
                    {{ item.title }}
                  </p>
                  @if (item.readAt === null) {
                    <span class="w-2 h-2 mt-1.5 rounded-full bg-primary flex-shrink-0"></span>
                  }
                </div>
                <p class="text-xs text-on-surface-variant">{{ item.body }}</p>
                <p class="text-[0.65rem] text-on-surface-variant/70">
                  {{ formatRelative(item.createdAt) }}
                </p>
              </button>
            </li>
          }
        </ul>
      }
    </div>
  }
</div>
